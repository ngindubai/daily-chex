<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="description" content="Daily-Chex — Digital check management for plant, vehicles & equipment" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <title>Daily-Chex</title>
  </head>
  <body>
    <div id="root">
      <!-- Pre-React loading state (replaced once React mounts) -->
      <div style="min-height:100dvh;display:flex;align-items:center;justify-content:center;background:#0a0a0a">
        <div style="text-align:center">
          <div style="width:40px;height:40px;border:3px solid #2a2a30;border-top-color:#facc15;border-radius:50%;margin:0 auto 16px;animation:spin 0.8s linear infinite"></div>
          <p style="color:#71717a;font-family:system-ui,sans-serif;font-size:13px">Loading Daily-Chex…</p>
        </div>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
