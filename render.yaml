databases:
  - name: daily-chex-db
    plan: free
    databaseName: daily_chex

services:
  - type: web
    name: daily-chex
    plan: free
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: daily-chex-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3200"
