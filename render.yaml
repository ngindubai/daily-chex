services:
  - type: web
    name: daily-chex
    plan: free
    runtime: node
    buildCommand: "cd app && npm install && npm run build && cd ../server && npm install && npm run build"
    startCommand: "cd server && node dist/db/migrate.js && node dist/db/seed-safe.js && node dist/index.js"
    envVars:
      - key: DATABASE_URL
        sync: false
